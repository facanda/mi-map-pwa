<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta Pro Multi - Located Me</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: white;
    }

    header {
      background: #1e1e1e;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 2px solid #00bcd4;
    }

    #controls {
      padding: 15px;
      background: #1a1a1a;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 200px;
    }

    button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #00bcd4;
      color: black;
    }

    .locate {
      background: #4caf50;
      color: white;
    }

    #map {
      height: 75vh;
      width: 100%;
    }

    #distance {
      text-align: center;
      padding: 10px;
      background: #1e1e1e;
      font-size: 18px;
      border-top: 2px solid #00bcd4;
    }
  </style>
</head>
<body>

<header>
  🚛 Ruta Pro Multi - Located Me
</header>

<div id="controls">
  <input type="text" id="pickup" placeholder="Pickup City" />
  <input type="text" id="delivery" placeholder="Delivery City" />
  <button class="primary" onclick="calculateRoute()">Calculate Distance</button>
  <button class="locate" onclick="locateMe()">📍 Located Me</button>
</div>

<div id="map"></div>

<div id="distance">
  Distance: 0 miles
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map("map").setView([39.8283, -98.5795], 4);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);

  let pickupMarker, deliveryMarker, routeLine;

  function geocode(city) {
    return fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${city}`
    ).then((res) => res.json());
  }

  async function calculateRoute() {
    const pickupCity = document.getElementById("pickup").value;
    const deliveryCity = document.getElementById("delivery").value;

    if (!pickupCity || !deliveryCity) {
      alert("Enter both cities");
      return;
    }

    const pickupData = await geocode(pickupCity);
    const deliveryData = await geocode(deliveryCity);

    if (!pickupData.length || !deliveryData.length) {
      alert("City not found");
      return;
    }

    const pickupLatLng = [
      parseFloat(pickupData[0].lat),
      parseFloat(pickupData[0].lon),
    ];

    const deliveryLatLng = [
      parseFloat(deliveryData[0].lat),
      parseFloat(deliveryData[0].lon),
    ];

    if (pickupMarker) map.removeLayer(pickupMarker);
    if (deliveryMarker) map.removeLayer(deliveryMarker);
    if (routeLine) map.removeLayer(routeLine);

    pickupMarker = L.marker(pickupLatLng)
      .addTo(map)
      .bindPopup("📦 Pickup")
      .openPopup();

    deliveryMarker = L.marker(deliveryLatLng)
      .addTo(map)
      .bindPopup("📍 Delivery");

    routeLine = L.polyline([pickupLatLng, deliveryLatLng], {
      color: "cyan",
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());

    const distance = map.distance(pickupLatLng, deliveryLatLng);
    const miles = (distance / 1609.34).toFixed(2);

    document.getElementById(
      "distance"
    ).innerText = `Distance: ${miles} miles`;
  }

  function locateMe() {
    map.locate({ setView: true, maxZoom: 13 });

    map.on("locationfound", function (e) {
      L.marker(e.latlng)
        .addTo(map)
        .bindPopup("📍 Located Me")
        .openPopup();
    });

    map.on("locationerror", function () {
      alert("Location access denied");
    });
  }
</script>

</body>
</html>
