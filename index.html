<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ruta Pro Multi</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#07111f">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ruta Pro Multi">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(10,18,34,.88);
      --panel-2:rgba(15,23,42,.95);
      --text:#eaf2ff;
      --muted:#9fb0cc;
      --line:rgba(255,255,255,.12);
      --line-2:rgba(255,255,255,.08);
      --shadow:0 22px 44px rgba(0,0,0,.38);
      --radius:20px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      height:100%;
    }

    body{
      font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:radial-gradient(circle at top, #10203d 0%, #07111f 48%, #050c16 100%);
      color:var(--text);
      overflow:hidden;
    }

    #map{
      position:absolute;
      inset:0;
      filter:saturate(1.05) contrast(1.02);
    }

    .top{
      position:absolute;
      top:calc(12px + env(safe-area-inset-top));
      left:calc(12px + env(safe-area-inset-left));
      right:calc(12px + env(safe-area-inset-right));
      z-index:9999;
      display:grid;
      gap:12px;
      pointer-events:none;
    }

    .card{
      pointer-events:auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(14px);
    }

    #topCard{
      overflow:visible !important;
    }

    .bar{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:linear-gradient(135deg, rgba(56,189,248,.12), rgba(139,92,246,.08));
      border-bottom:1px solid var(--line-2);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.45), transparent 45%),
        linear-gradient(135deg, rgba(34,197,94,.28), rgba(139,92,246,.24));
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .brand h1{
      margin:0;
      font-size:16px;
      line-height:1.1;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand p{
      margin:4px 0 0;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btnRow{
      display:flex;
      gap:8px;
      align-items:center;
      flex-shrink:0;
      position:relative;
      overflow:visible;
    }

    .iconBtn{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.07);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:18px;
      transition:.18s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .iconBtn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.1);
    }

    .menu-dropdown{
      position:absolute;
      top:50px;
      right:0;
      min-width:250px;
      background:rgba(10,18,34,.98);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:8px;
      display:grid;
      gap:6px;
      z-index:20000;
    }

    .menu-item{
      width:100%;
      text-align:left;
      border:none;
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:12px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
    }

    .menu-item:hover{
      background:rgba(255,255,255,.12);
    }

    .menu-item.active{
      border:1px solid rgba(34,197,94,.55);
      background:linear-gradient(135deg, rgba(34,197,94,.18), rgba(34,197,94,.08));
    }

    .search{
      padding:12px;
      display:grid;
      gap:12px;
      max-height:40vh;
      overflow:auto;
    }

    #stops{
      display:grid;
      gap:10px;
    }

    .row{
      display:grid;
      grid-template-columns:20px 1fr 42px 46px;
      gap:10px;
      align-items:start;
    }

    .row.hidden-row{
      display:none;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      justify-self:center;
      margin-top:17px;
      box-shadow:0 0 0 4px rgba(255,255,255,.05), 0 0 14px rgba(255,255,255,.08);
    }

    .field{
      position:relative;
      display:grid;
      gap:0;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:0;
      overflow:visible;
    }

    input{
      width:100%;
      height:46px;
      border-radius:15px;
      border:1px solid transparent;
      outline:none;
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:0 14px;
      font-size:14px;
      transition:.18s ease;
      margin-bottom:0;
    }

    input:focus{
      border-color:rgba(56,189,248,.55);
      box-shadow:0 0 0 3px rgba(56,189,248,.12);
      background:rgba(255,255,255,.08);
    }

    input::placeholder{
      color:rgba(234,242,255,.46);
    }

    .point-inline-info{
      margin-top:-2px;
      padding:0 14px 10px 14px;
      font-size:12px;
      color:#cbd5e1;
      line-height:1.25;
      min-height:20px;
    }

    .smallBtn{
      height:46px;
      border-radius:15px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      font-weight:800;
      transition:.18s ease;
    }

    .smallBtn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.1);
    }

    .suggest{
      position:absolute;
      top:50px;
      left:0;
      right:0;
      background:rgba(10,18,34,.98);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:none;
      z-index:99999;
    }

    .suggest.open{ display:block; }

    .item{
      padding:11px 13px;
      border-top:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      line-height:1.25;
      transition:.15s ease;
    }

    .item:first-child{ border-top:0; }
    .item:hover{ background:rgba(255,255,255,.06); }

    .item .t{
      font-size:13px;
      color:var(--text);
      font-weight:600;
    }

    .item .s{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      font-size:12px;
      color:var(--text);
      cursor:pointer;
      user-select:none;
      font-weight:700;
      transition:.18s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .chip:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.1);
    }

    .chip.danger{
      border-color:rgba(239,68,68,.35);
      background:linear-gradient(135deg, rgba(239,68,68,.12), rgba(239,68,68,.04));
    }

    .mini-tip{
      font-size:12px;
      color:var(--muted);
      padding:2px 2px 0 2px;
    }

    .sheet{
      position:absolute;
      left:calc(12px + env(safe-area-inset-left));
      right:calc(12px + env(safe-area-inset-right));
      bottom:calc(12px + env(safe-area-inset-bottom));
      z-index:9999;
      pointer-events:none;
      display:grid;
      gap:10px;
    }

    .sheet .card{
      pointer-events:auto;
      padding:14px;
      background:var(--panel-2);
    }

    .resultTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .metrics{
      display:grid;
      gap:6px;
    }

    .big{
      font-size:24px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .sub{
      color:var(--muted);
      font-size:12px;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .mini-card{
      background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line-2);
      border-radius:16px;
      padding:11px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .mini-label{
      font-size:11px;
      color:var(--muted);
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .mini-value{
      font-size:15px;
      font-weight:800;
      line-height:1.2;
    }

    .status{
      margin-top:12px;
      font-size:12px;
      color:rgba(229,231,235,.78);
      min-height:16px;
    }

    .leaflet-control-zoom a{
      background:rgba(10,18,34,.92) !important;
      color:#e5e7eb !important;
      border:1px solid rgba(255,255,255,.12) !important;
    }

    .hidden-panel{
      display:none !important;
    }

    @media (max-width:520px){
      .brand p{ display:none; }
      .row{ grid-template-columns:14px 1fr 42px 46px; }
      .summary-grid{ grid-template-columns:1fr 1fr; }
      .menu-dropdown{ min-width:220px; }
    }

    @media (max-width:420px){
      .summary-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="top">
  <div class="card" id="topCard">
    <div class="bar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 22s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11Z" stroke="white" stroke-width="2"/>
            <circle cx="12" cy="11" r="2.5" stroke="white" stroke-width="2"/>
          </svg>
        </div>
        <div style="min-width:0">
          <h1>Ruta Pro Multi</h1>
          <p>🟢 Point A automático · 🎯 movible · 📱 menú limpio para móvil</p>
        </div>
      </div>

      <div class="btnRow">
        <button class="iconBtn" id="btnMenu" title="Menú">☰</button>

        <div class="menu-dropdown hidden-panel" id="menuDropdown">
          <button class="menu-item" id="modeRoute">🧭 Ruta con paradas</button>
          <button class="menu-item" id="modeSolo">📌 Solo punto</button>
          <button class="menu-item" id="menuToggleTop">Mostrar / ocultar panel superior</button>
          <button class="menu-item" id="menuToggleBottom">Mostrar / ocultar resumen</button>
          <button class="menu-item" id="menuToggleAll">Mostrar / ocultar todo</button>
          <button class="menu-item" id="btnLocate">📍 Mi ubicación</button>
          <button class="menu-item" id="btnReset">⟲ Reset</button>
        </div>
      </div>
    </div>

    <div class="search hidden-panel" id="searchPanel">
      <div id="stops"></div>

      <div class="chips" style="justify-content:space-between;">
        <button class="chip" id="btnAddStop">➕ Agregar parada</button>
        <button class="chip" id="btnRoute">🚚 Calcular ruta</button>
      </div>

      <div class="mini-tip">
        Point A se pone automático. Puedes mover A y B arrastrando el marcador.
      </div>
    </div>
  </div>
</div>

<div class="sheet" id="bottomSheet">
  <div class="card">
    <div class="resultTop">
      <div class="metrics">
        <div class="big" id="metricDistance">—</div>
        <div class="sub" id="metricDuration">Tiempo: —</div>
        <div class="sub" id="singleCity">Ciudad: —</div>
      </div>
      <div class="sub" style="text-align:right" id="metricFromTo">—</div>
    </div>

    <div class="summary-grid">
      <div class="mini-card">
        <div class="mini-label">Distancia total</div>
        <div class="mini-value" id="summaryDistance">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Tiempo estimado</div>
        <div class="mini-value" id="summaryTime">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Modo</div>
        <div class="mini-value" id="summaryMode">Ruta con paradas</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Puntos</div>
        <div class="mini-value" id="summaryPoints">0</div>
      </div>
    </div>

    <div class="chips" style="margin-top:12px;">
      <div class="chip" id="chipFit">🔎 Ver</div>
      <div class="chip" id="chipClearRoute">🧹 Quitar</div>
      <div class="chip danger" id="chipClearAll">🗑 Reset total</div>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const map = L.map('map').setView([39.8283, -98.5795], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const $ = (id) => document.getElementById(id);

  function setStatus(msg){ $("status").textContent = msg || ""; }
  function setSingleCity(text){ $("singleCity").textContent = `Ciudad: ${text || "—"}`; }

  function setMetrics(distanceText, durationText, fromToText){
    $("metricDistance").textContent = distanceText ?? "—";
    $("metricDuration").textContent = durationText ?? "Tiempo: —";
    $("metricFromTo").textContent = fromToText ?? "—";
    $("summaryDistance").textContent = distanceText ?? "—";
    $("summaryTime").textContent = (durationText || "Tiempo: —").replace("Tiempo: ", "");
  }

  function setSummaryMode(text){ $("summaryMode").textContent = text || "—"; }
  function setSummaryPoints(n){ $("summaryPoints").textContent = String(n ?? 0); }

  function milesFromMeters(m){ return m / 1609.344; }
  function formatTimeSeconds(sec){
    const totalMin = Math.round(sec / 60);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h ? `${h} h ${m} min` : `${m} min`;
  }
  function milesBetween(a,b){ return milesFromMeters(map.distance(a,b)); }

  function bearingDegrees(from, to){
    const lat1 = from.lat * Math.PI/180;
    const lat2 = to.lat * Math.PI/180;
    const dLon = (to.lng - from.lng) * Math.PI/180;
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
    let brng = Math.atan2(y, x) * 180/Math.PI;
    brng = (brng + 360) % 360;
    return brng;
  }

  function degToCompass8(deg){
    const dirs = ["N","NE","E","SE","S","SW","W","NW"];
    const i = Math.round(deg / 45) % 8;
    return dirs[i];
  }

  async function nominatimSearch(q){
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(q)}&addressdetails=1&limit=6`;
    const res = await fetch(url, { headers: { "Accept":"application/json" }});
    if(!res.ok) throw new Error("Nominatim search failed");
    return await res.json();
  }

  async function nominatimReverse(lat, lon){
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
    const res = await fetch(url, { headers: { "Accept":"application/json" }});
    if(!res.ok) throw new Error("Nominatim reverse failed");
    const data = await res.json();
    const a = data.address || {};

    const city = a.city || a.town || a.village || a.municipality || "";
    const locality = a.locality || a.city_district || a.suburb || a.neighbourhood || a.hamlet || "";
    const finalCity = city || locality || "Ciudad no encontrada";

    const state =
      a.state ||
      a.region ||
      a.state_district ||
      a.province ||
      a.territory ||
      "";

    return {
      city: finalCity,
      state,
      country: a.country || "",
      display: data.display_name || finalCity
    };
  }

  const placeCenterCache = new Map();

  async function getPlaceCenter(city, state, country){
    const key = `${city}|${state}|${country}`.toLowerCase();
    if (placeCenterCache.has(key)) return placeCenterCache.get(key);

    const q = [city, state, country].filter(Boolean).join(", ");
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(q)}&limit=1`;

    const res = await fetch(url, { headers: { "Accept":"application/json" }});
    if(!res.ok) return null;

    const arr = await res.json();
    if(!arr?.length) return null;

    const center = L.latLng(Number(arr[0].lat), Number(arr[0].lon));
    placeCenterCache.set(key, center);
    return center;
  }

  async function prettyRelativeCity(pointLatLng){
    const r = await nominatimReverse(pointLatLng.lat, pointLatLng.lng);
    const cityWithState = r.state ? `${r.city}, ${r.state}` : r.city;

    const center = await getPlaceCenter(r.city, r.state, r.country);
    if(!center) return { text: cityWithState, raw: r };

    const mi = milesBetween(center, pointLatLng);
    const dir = degToCompass8(bearingDegrees(center, pointLatLng));

    if (mi < 0.15) return { text: cityWithState, raw: r };

    return { text: `${mi.toFixed(2)} mi ${dir} ${cityWithState}`, raw: r };
  }

  let routeLayer = null;
  let soloMode = false;
  let soloMarker = null;
  let userLatLng = null;
  let autoPointAReady = false;

  let topHidden = true;
  let bottomHidden = true;
  let allHidden = true;

  async function getRouteOSRM_Multi(latlngs){
    const coords = latlngs.map(p => `${p.lng},${p.lat}`).join(";");
    const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&alternatives=false&steps=false`;
    const res = await fetch(url, { headers: { "Accept":"application/json" }});
    if(!res.ok) throw new Error("OSRM request failed");
    const data = await res.json();
    if(!data.routes?.length) throw new Error("No route found");
    return data.routes[0];
  }

  function clearRouteOnly(){
    if (routeLayer) {
      map.removeLayer(routeLayer);
      routeLayer = null;
    }
    setMetrics("—","Tiempo: —", soloMode ? "Solo punto" : "Ruta con paradas");
    setSummaryMode(soloMode ? "Solo punto" : "Ruta con paradas");
    setSummaryPoints(soloMode ? (soloMarker ? 1 : 0) : stops.filter(s => s.latlng).length);
  }

  async function computeMultiRoute(){
    if (soloMode){
      setStatus("Estás en Solo punto. Cambia a Ruta para usar paradas.");
      return;
    }

    const pts = stops.filter(s => s.latlng).map(s => s.latlng);
    if (pts.length < 2){
      setStatus("Pon al menos 2 puntos (A y B).");
      return;
    }

    setStatus("Calculando ruta con paradas…");
    clearRouteOnly();

    try{
      const route = await getRouteOSRM_Multi(pts);
      const miles = milesFromMeters(route.distance);
      const timeTxt = formatTimeSeconds(route.duration);

      routeLayer = L.geoJSON(route.geometry, { style: { weight: 6 } }).addTo(map);
      map.fitBounds(routeLayer.getBounds(), { padding: [30,30] });

      setMetrics(`${miles.toFixed(2)} mi`, `Tiempo: ${timeTxt}`, `${pts.length} puntos`);
      setSingleCity("—");
      setSummaryMode("Ruta con paradas");
      setSummaryPoints(pts.length);
      setStatus("");
    } catch(e){
      setStatus("No se pudo calcular ruta. Intenta con menos paradas o espera un momento.");
    }
  }

  function fitView(){
    if (soloMode && soloMarker){
      map.setView(soloMarker.getLatLng(), Math.max(map.getZoom(), 14));
      return;
    }
    if (routeLayer){
      map.fitBounds(routeLayer.getBounds(), { padding: [30,30] });
      return;
    }
    const pts = stops.filter(s => s.latlng).map(s => s.latlng);
    if (pts.length) map.fitBounds(L.latLngBounds(pts), { padding: [60,60] });
  }

  function escapeHtml(str){
    return (str||"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function debounce(fn, ms){
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  function closeSuggestEl(el){ el.classList.remove("open"); }
  function openSuggestEl(el){ el.classList.add("open"); }

  const stops = [];
  let activePickStopId = null;
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const stopsEl = $("stops");

  function makeId(){ return Math.random().toString(16).slice(2); }

  function stopLabel(index){
    if (index < letters.length) return letters[index];
    const base = letters[index % letters.length];
    const n = Math.floor(index / letters.length);
    return `${base}${n}`;
  }

  function renderStops(){
    stopsEl.innerHTML = "";

    stops.forEach((s, idx) => {
      const row = document.createElement("div");
      row.className = "row";

      if (idx > 1 && !s.latlng) {
        row.classList.add("hidden-row");
      }

      const dot = document.createElement("div");
      dot.className = "dot";
      dot.style.background = idx === 0 ? "#22c55e" : idx === 1 ? "#38bdf8" : "#8b5cf6";

      const field = document.createElement("div");
      field.className = "field";

      const input = document.createElement("input");
      input.placeholder = `Punto ${s.label} (dirección o ciudad)`;
      input.autocomplete = "off";

      const suggest = document.createElement("div");
      suggest.className = "suggest";

      const info = document.createElement("div");
      info.className = "point-inline-info";
      info.innerHTML = s.prettyText ? escapeHtml(s.prettyText) : "";

      field.appendChild(input);
      field.appendChild(info);
      field.appendChild(suggest);

      const pickBtn = document.createElement("button");
      pickBtn.className = "smallBtn";
      pickBtn.textContent = s.label;
      pickBtn.title = `Elegir ${s.label} en el mapa`;

      const delBtn = document.createElement("button");
      delBtn.className = "smallBtn";
      delBtn.textContent = "✕";
      delBtn.title = "Quitar parada";

      row.appendChild(dot);
      row.appendChild(field);
      row.appendChild(pickBtn);
      row.appendChild(delBtn);

      stopsEl.appendChild(row);

      s.inputEl = input;
      s.suggestEl = suggest;
      s.infoEl = info;

      const onType = debounce(async () => {
        const q = input.value.trim();
        if (q.length < 3) {
          closeSuggestEl(suggest);
          return;
        }
        try{
          const results = await nominatimSearch(q);
          renderSuggestForStop(s, results);
        } catch(e){
          setStatus("Error buscando lugar.");
        }
      }, 250);

      input.addEventListener("input", onType);

      input.addEventListener("change", async () => {
        const q = input.value.trim();
        if (q.length < 3) return;
        try{
          const results = await nominatimSearch(q);
          if (results?.length){
            const r = results[0];
            const latlng = L.latLng(Number(r.lat), Number(r.lon));
            await setStopLatLng(s.id, latlng, true);
            map.setView(latlng, Math.max(map.getZoom(), 12));
          }
        } catch(e){}
      });

      pickBtn.addEventListener("click", () => {
        if (soloMode){
          setStatus("Estás en Solo punto. Cambia a Ruta para usar paradas.");
          return;
        }
        activePickStopId = s.id;
        setStatus(`Selecciona punto ${s.label} en el mapa.`);
      });

      delBtn.addEventListener("click", () => removeStop(s.id));
    });

    setSummaryPoints(soloMode ? (soloMarker ? 1 : 0) : stops.filter(s => s.latlng).length);
  }

  function renderSuggestForStop(stop, results){
    const box = stop.suggestEl;
    if (!results?.length){
      box.innerHTML = `<div class="item"><div class="t">Sin resultados</div></div>`;
      openSuggestEl(box);
      return;
    }

    box.innerHTML = results.map((r, idx) => {
      const t = (r.display_name || "").split(",").slice(0,2).join(", ");
      const s = (r.display_name || "").split(",").slice(2).join(", ").trim();
      return `
        <div class="item" data-idx="${idx}">
          <div class="t">${escapeHtml(t || r.display_name || "Resultado")}</div>
          <div class="s">${escapeHtml(s)}</div>
        </div>
      `;
    }).join("");

    box.querySelectorAll(".item").forEach(el => {
      el.addEventListener("click", async () => {
        const idx = Number(el.getAttribute("data-idx"));
        const r = results[idx];
        const latlng = L.latLng(Number(r.lat), Number(r.lon));

        stop.inputEl.value = r.display_name || "";
        closeSuggestEl(box);

        await setStopLatLng(stop.id, latlng, true);
        map.setView(latlng, Math.max(map.getZoom(), 12));
      });
    });

    openSuggestEl(box);
  }

  function addStop(prefillLabel = null){
    const id = makeId();
    const label = prefillLabel || stopLabel(stops.length);
    stops.push({
      id,
      label,
      latlng: null,
      marker: null,
      inputEl: null,
      suggestEl: null,
      infoEl: null,
      prettyText: ""
    });
    renderStops();
    return id;
  }

  function removeStop(id){
    const i = stops.findIndex(s => s.id === id);
    if (i === -1) return;

    if (stops[i].marker) map.removeLayer(stops[i].marker);
    stops.splice(i, 1);

    stops.forEach((s, idx) => s.label = stopLabel(idx));
    renderStops();

    if (stops.filter(s => s.latlng).length < 2) clearRouteOnly();
  }

  async function setStopLatLng(id, latlng, updateTextFromReverse=false){
    const s = stops.find(x => x.id === id);
    if (!s) return;

    s.latlng = latlng;

    if (s.marker) map.removeLayer(s.marker);

    s.marker = L.marker(latlng, { draggable:true }).addTo(map);
    s.marker.bindTooltip(s.label, { permanent:true, direction:"top", offset:[0,-10] });

    try{
      const pretty = await prettyRelativeCity(latlng);
      s.prettyText = pretty.text;

      if (s.infoEl) s.infoEl.innerHTML = escapeHtml(pretty.text);
      if (updateTextFromReverse && s.inputEl) s.inputEl.value = pretty.text;

      s.marker.bindPopup(`
        <div style="min-width:180px;">
          <div style="font-weight:800; margin-bottom:8px;">Punto ${escapeHtml(s.label)}</div>
          <div style="font-size:13px; line-height:1.35;">${escapeHtml(pretty.text)}</div>
        </div>
      `);
    } catch {
      s.prettyText = "";
      if (s.infoEl) s.infoEl.innerHTML = "";
    }

    s.marker.on("dragend", async () => {
      s.latlng = s.marker.getLatLng();
      try{
        const pretty = await prettyRelativeCity(s.latlng);
        s.prettyText = pretty.text;

        if (s.inputEl) s.inputEl.value = pretty.text;
        if (s.infoEl) s.infoEl.innerHTML = escapeHtml(pretty.text);

        s.marker.bindPopup(`
          <div style="min-width:180px;">
            <div style="font-weight:800; margin-bottom:8px;">Punto ${escapeHtml(s.label)}</div>
            <div style="font-size:13px; line-height:1.35;">${escapeHtml(pretty.text)}</div>
          </div>
        `);
      } catch {}
    });

    renderStops();
  }

  document.addEventListener("click", (e) => {
    stops.forEach(s => {
      if (!s.suggestEl || !s.inputEl) return;
      const field = s.inputEl.closest(".field");
      if (field && !field.contains(e.target)) closeSuggestEl(s.suggestEl);
    });
  });

  function getUserLocation(){
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error("No geolocation"));
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve(L.latLng(pos.coords.latitude, pos.coords.longitude)),
        reject,
        { enableHighAccuracy:true, timeout:8000 }
      );
    });
  }

  async function ensureAutoPointA(){
    if (soloMode || autoPointAReady) return;
    if (!stops.length) return;

    try{
      setStatus("Obteniendo ubicación para Point A…");
      userLatLng = await getUserLocation();

      const pointA = stops[0];
      await setStopLatLng(pointA.id, userLatLng, true);
      map.setView(userLatLng, 13);

      autoPointAReady = true;
      setSummaryPoints(stops.filter(s => s.latlng).length);
      setStatus("Point A listo. Puedes moverlo o seleccionar Point B.");
    } catch(e){
      setStatus("No se pudo obtener tu ubicación automática para Point A.");
    }
  }

  async function handleSoloPoint(latlng){
    stops.forEach(s => {
      if (s.marker) {
        map.removeLayer(s.marker);
        s.marker = null;
        s.latlng = null;
        s.prettyText = "";
      }
      if (s.inputEl) s.inputEl.value = "";
      if (s.infoEl) s.infoEl.innerHTML = "";
    });

    clearRouteOnly();

    if (soloMarker) map.removeLayer(soloMarker);
    soloMarker = L.marker(latlng, { draggable:true }).addTo(map);

    const updateSoloMarker = async (p) => {
      let prettyText = "Ciudad no encontrada";
      try{
        setStatus("Buscando ciudad…");
        const pretty = await prettyRelativeCity(p);
        prettyText = pretty.text;
      } catch {}

      setSingleCity(prettyText);

      soloMarker.bindPopup(`
        <div style="min-width:180px;">
          <div style="font-weight:800; margin-bottom:8px;">Solo punto</div>
          <div style="font-size:13px; line-height:1.35;">${escapeHtml(prettyText)}</div>
        </div>
      `);

      try{
        if (!userLatLng){
          setStatus("Obteniendo tu ubicación para calcular millas…");
          userLatLng = await getUserLocation();
        }
        const miles = milesBetween(userLatLng, p);
        setMetrics(`${miles.toFixed(2)} mi`, "Desde tu ubicación", "Solo punto");
        setSummaryMode("Solo punto");
        setSummaryPoints(1);
        setStatus("");
      } catch(e){
        setMetrics("—", "Activa ubicación para millas", "Solo punto");
        setSummaryMode("Solo punto");
        setSummaryPoints(1);
        setStatus("No hay permiso de ubicación. Actívalo para calcular millas.");
      }
    };

    await updateSoloMarker(latlng);

    soloMarker.on("dragend", async () => {
      const p = soloMarker.getLatLng();
      await updateSoloMarker(p);
    });

    map.setView(latlng, Math.max(map.getZoom(), 14));
  }

  function updateModeButtons(){
    $("modeRoute").classList.toggle("active", !soloMode);
    $("modeSolo").classList.toggle("active", soloMode);
  }

  function setModeRoute(){
    soloMode = false;
    updateModeButtons();
    setSingleCity("—");
    setMetrics("—","Tiempo: —","Ruta con paradas");
    setSummaryMode("Ruta con paradas");
    setSummaryPoints(stops.filter(s => s.latlng).length);
    setStatus("Modo Ruta: Point A es automático. Usa el menú ☰ para mostrar paneles.");
    closeMenu();
  }

  function setModeSolo(){
    soloMode = true;
    updateModeButtons();
    clearRouteOnly();
    setSingleCity("—");
    setMetrics("—","Desde tu ubicación","Solo punto");
    setSummaryMode("Solo punto");
    setSummaryPoints(soloMarker ? 1 : 0);
    setStatus("Modo Solo punto: haz click en el mapa.");
    closeMenu();
  }

  function updateMenuLabels(){
    $("menuToggleTop").textContent = topHidden ? "Mostrar panel superior" : "Ocultar panel superior";
    $("menuToggleBottom").textContent = bottomHidden ? "Mostrar resumen" : "Ocultar resumen";
    $("menuToggleAll").textContent = allHidden ? "Mostrar todo" : "Ocultar todo";
  }

  function closeMenu(){
    $("menuDropdown").classList.add("hidden-panel");
  }

  function toggleMenu(){
    $("menuDropdown").classList.toggle("hidden-panel");
    updateMenuLabels();
    updateModeButtons();
  }

  function syncAllHidden(){
    allHidden = topHidden && bottomHidden;
    updateMenuLabels();
  }

  function toggleTopPanel(){
    topHidden = !topHidden;
    $("searchPanel").classList.toggle("hidden-panel", topHidden);
    syncAllHidden();
  }

  function toggleBottomPanel(){
    bottomHidden = !bottomHidden;
    $("bottomSheet").classList.toggle("hidden-panel", bottomHidden);
    syncAllHidden();
  }

  function toggleAllPanels(){
    allHidden = !allHidden;
    topHidden = allHidden;
    bottomHidden = allHidden;

    $("searchPanel").classList.toggle("hidden-panel", topHidden);
    $("bottomSheet").classList.toggle("hidden-panel", bottomHidden);

    updateMenuLabels();
  }

  $("btnMenu").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleMenu();
  });

  $("modeRoute").addEventListener("click", setModeRoute);
  $("modeSolo").addEventListener("click", setModeSolo);

  $("menuToggleTop").addEventListener("click", () => {
    toggleTopPanel();
    closeMenu();
  });

  $("menuToggleBottom").addEventListener("click", () => {
    toggleBottomPanel();
    closeMenu();
  });

  $("menuToggleAll").addEventListener("click", () => {
    toggleAllPanels();
    closeMenu();
  });

  $("btnAddStop").addEventListener("click", () => {
    addStop();

    if (topHidden) {
      topHidden = false;
      $("searchPanel").classList.remove("hidden-panel");
      allHidden = false;
      updateMenuLabels();
    }
  });

  $("btnRoute").addEventListener("click", computeMultiRoute);

  $("btnReset").addEventListener("click", async () => {
    if (soloMarker) {
      map.removeLayer(soloMarker);
      soloMarker = null;
    }

    stops.forEach(s => {
      if (s.marker) map.removeLayer(s.marker);
    });

    stops.length = 0;
    clearRouteOnly();
    setSingleCity("—");
    autoPointAReady = false;
    setStatus("");

    addStop();
    addStop();
    setModeRoute();
    await ensureAutoPointA();
    closeMenu();
  });

  $("chipClearAll").addEventListener("click", () => $("btnReset").click());
  $("chipFit").addEventListener("click", fitView);

  $("chipClearRoute").addEventListener("click", () => {
    if (soloMode){
      if (soloMarker) {
        map.removeLayer(soloMarker);
        soloMarker = null;
      }
      setSingleCity("—");
      setMetrics("—","Desde tu ubicación","Solo punto");
      setSummaryMode("Solo punto");
      setSummaryPoints(0);
      setStatus("Marcador removido.");
      return;
    }

    clearRouteOnly();
    setStatus("Ruta removida.");
  });

  $("btnLocate").addEventListener("click", async () => {
    if (!navigator.geolocation){
      setStatus("Geolocalización no disponible.");
      closeMenu();
      return;
    }

    try{
      setStatus("Obteniendo tu ubicación…");
      userLatLng = await getUserLocation();
      map.setView(userLatLng, 14);

      if (!soloMode && stops.length){
        await setStopLatLng(stops[0].id, userLatLng, true);
        autoPointAReady = true;
        setStatus("Point A actualizado con tu ubicación. Puedes moverlo.");
      } else {
        setStatus("Ubicación lista.");
      }
    } catch {
      setStatus("No se pudo obtener tu ubicación.");
    } finally {
      closeMenu();
    }
  });

  map.on("click", async (e) => {
    if (soloMode){
      await handleSoloPoint(e.latlng);
      return;
    }

    let targetId = activePickStopId;
    if (!targetId){
      const empty = stops.find(s => !s.latlng);
      targetId = empty ? empty.id : stops[stops.length - 1].id;
    }

    activePickStopId = null;
    await setStopLatLng(targetId, e.latlng, true);
    setStatus("");
  });

  document.addEventListener("click", (e) => {
    const menu = $("menuDropdown");
    const btn = $("btnMenu");
    if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
      closeMenu();
    }
  });

  addStop();
  addStop();

  $("searchPanel").classList.add("hidden-panel");
$("bottomSheet").classList.add("hidden-panel");

setModeRoute();
updateMenuLabels();
updateModeButtons();

  window.addEventListener("load", async () => {
    await ensureAutoPointA();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  });
</script>

</body>
